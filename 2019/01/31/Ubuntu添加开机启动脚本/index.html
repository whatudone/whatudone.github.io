        <p>新建一个shell脚本，内容如下</p>
<figure class="highlight powershell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#!/bin/bash</span></span><br><span class="line"></span><br><span class="line"><span class="comment">### BEGIN INIT INFO</span></span><br><span class="line"><span class="comment"># Provides:  protected_shell</span></span><br><span class="line"><span class="comment"># Required-Start:  $local_fs $remote_fs $network $syslog $named</span></span><br><span class="line"><span class="comment"># Required-Stop:  $local_fs $remote_fs $network $syslog $named</span></span><br><span class="line"><span class="comment"># Default-Start: 2 3 4 5</span></span><br><span class="line"><span class="comment"># Default-Stop:  0 1 6</span></span><br><span class="line"><span class="comment"># Short-Description: protect the gdwy_device_server</span></span><br><span class="line"><span class="comment">### END INIT INFO</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># chkconfig: - 60 50</span></span><br><span class="line"><span class="comment"># description: service demo script</span></span><br><span class="line"><span class="comment"># processname: service_demo</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># Source function library.</span></span><br><span class="line"><span class="comment">#./etc/init.d/functions</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># Source networking configuration.</span></span><br><span class="line"><span class="comment">#./etc/sysconfig/network</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># Check that networking is up.</span></span><br><span class="line"><span class="comment">#[ $&#123;NETWORKING&#125;="no" ] &amp;&amp; exit 0</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#进程名字可修改</span></span><br><span class="line">PRO_NAME=/home/liurui/test1/build-test1-<span class="number">64</span>bit-Debug/test1</span><br><span class="line">CMD=<span class="string">"<span class="variable">$PRO_NAME</span> "</span></span><br><span class="line"><span class="comment">#exec permission</span></span><br><span class="line">[ -x <span class="variable">$PRO_NAME</span> ] || <span class="keyword">exit</span> <span class="number">0</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">while</span> true ; <span class="keyword">do</span></span><br><span class="line">     <span class="comment">#用ps获取$PRO_NAME进程数量</span></span><br><span class="line">     NUM=`ps aux | grep -w $&#123;PRO_NAME&#125; | grep -v grep |wc -l`</span><br><span class="line">     echo <span class="variable">$NUM</span></span><br><span class="line">     <span class="comment">#少于1，重启进程</span></span><br><span class="line">     <span class="keyword">if</span> [ <span class="string">"$&#123;NUM&#125;"</span> <span class="nomarkup">-lt</span> <span class="string">"1"</span> ];then</span><br><span class="line">         echo <span class="string">"$&#123;PRO_NAME&#125; was killed"</span></span><br><span class="line">         <span class="variable">$CMD</span></span><br><span class="line">    <span class="comment">#大于1，杀掉所有进程，重启</span></span><br><span class="line">    elif [ <span class="string">"$&#123;NUM&#125;"</span> <span class="nomarkup">-gt</span> <span class="string">"1"</span> ];then</span><br><span class="line">        echo <span class="string">"more than 1 $&#123;PRO_NAME&#125;,killall $&#123;PRO_NAME&#125;"</span></span><br><span class="line">        killall -<span class="number">9</span>  <span class="variable">$PRO_NAME</span></span><br><span class="line">        <span class="variable">$CMD</span></span><br><span class="line">     fi</span><br><span class="line">     <span class="comment">#kill僵尸进程</span></span><br><span class="line">     NUM_STAT=`ps aux | grep -w $&#123;PRO_NAME&#125; | grep T | grep -v grep | wc -l`</span><br><span class="line">     <span class="keyword">if</span> [ <span class="string">"$&#123;NUM_STAT&#125;"</span> <span class="nomarkup">-gt</span> <span class="string">"0"</span> ];then</span><br><span class="line">         killall -<span class="number">9</span> $&#123;PRO_NAME&#125;</span><br><span class="line">         echo <span class="string">"zombie was killed"</span></span><br><span class="line">         <span class="variable">$CMD</span></span><br><span class="line">    fi</span><br><span class="line">     sleep <span class="number">5</span>s</span><br><span class="line">done</span><br><span class="line">echo <span class="string">"shell was killed"</span></span><br><span class="line"><span class="keyword">exit</span> <span class="number">0</span></span><br></pre></td></tr></table></figure>
<p>如果不添加前面的启动信息（BEGIN INIT INFO）会报错,如下：</p>
<figure class="highlight powershell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line">insserv: warning: script <span class="string">'protected_shell'</span> missing LSB tags and overrides</span><br><span class="line"></span><br><span class="line">insserv: There is a loop between service watchdog and protected_shell <span class="keyword">if</span> stopped</span><br><span class="line"></span><br><span class="line">insserv:  loop involving service protected_shell at depth <span class="number">2</span></span><br><span class="line">insserv:  loop involving service watchdog at depth <span class="number">1</span></span><br><span class="line"></span><br><span class="line">insserv: Stopping protected_shell depends on watchdog and therefore on system facility `$all<span class="string">' which can not be true!</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">insserv: exiting now without changing boot order!</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">update-rc.d: error: insserv rejected the script header</span></span><br></pre></td></tr></table></figure>
<p>主要是因为脚本的启动顺序和其它服务冲突导致，同时没有配置脚本启动的级别<br> 赋予执行权限</p>
<figure class="highlight powershell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">chmod +x test.sh</span><br><span class="line"></span><br><span class="line">sudo mv test.sh /etc/init.d/</span><br></pre></td></tr></table></figure>
<p>添加开机启动</p>
<figure class="highlight powershell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">sudo update-rc.d test.sh defaults</span><br></pre></td></tr></table></figure>
<p>取消开机启动</p>
<figure class="highlight powershell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">sudo update-rc.d -f test.sh remove</span><br></pre></td></tr></table></figure>
